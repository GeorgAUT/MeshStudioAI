site_name: MeshStudioAI
site_description: AI tools for adaptive meshing for finite element methods (FEM)
repo_url: https://github.com/GeorgAUT/MeshStudioAI
repo_name: GeorgAUT/MeshStudioAI

theme:
  name: material
  logo: assets/images/logo_light.png
  favicon: assets/images/favicon.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Navier–Stokes adaptivity: getting-started/navier-stokes-adaptivity.md
  - Guides:
      - Training: guides/training.md
      - Evaluation: guides/evaluation.md
      - W&B and Checkpoints: guides/wandb-and-checkpoints.md
      - Advanced topics:
          - Training datasets: guides/datasets.md
          - First full training + evaluation: guides/first-run.md
  - Reference:
      - Configuration: reference/configuration.md
      - Repository Layout: reference/repository-layout.md
  - Troubleshooting: troubleshooting.md

extra_css:
  - assets/stylesheets/extra.css
